type: charm
base: ubuntu@24.04
build-base: ubuntu@24.04

platforms:
  amd64:
parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
    - astral-uv
    build-packages:
      - build-essential
      - python3-dev
      - pkg-config
      - libffi-dev
      - libssl-dev

name: subdomain-integrator
title: Subdomain Integrator
description: |
  A Juju charm that exposes multiple related applications under
  <app-name>.<base-domain> through a shared Gateway API entrypoint.
summary: Shared Gateway API ingress with automatic subdomain routing.
assumes:
  - k8s-api
  - juju >= 3.3

requires:
  certificates:
    interface: tls-certificates
    limit: 1
  dns-record:
    interface: dns_record
  haproxy-route:
    interface: haproxy-route

provides:
  ingress:
    interface: ingress

config:
  options:
    base-domain:
      description: Base DNS domain used to expose related applications.
      type: string
    gateway-class:
      description: The gateway class.
      type: string
    enforce-https:
      default: false
      description: |
        Whether to enforce HTTPS by redirecting HTTP traffic to HTTPS.
        Note: per-subdomain TLS certificate automation is not yet implemented.
      type: boolean

actions:
  get-certificate:
    description: Returns the TLS Certificate. Intended for testing and debugging purposes.
    params:
      hostname:
        type: string
        description: Hostname to extract certs from.

charm-libs:
  - lib: haproxy.haproxy_route
    version: "2"
